name: Repository / Release Surface

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  release-surface:
    name: Release surface
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the complete evidence history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up the pinned Python interpreter
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version

      - name: Validate and render the release surface
        run: bash scripts/ci/check-repository-release.sh

      - name: Prove release checks did not mutate tracked evidence
        run: git diff --exit-code

      - name: Retain release-surface evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: repository-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/repository-release/
          if-no-files-found: warn
          retention-days: 14
          compression-level: 9
