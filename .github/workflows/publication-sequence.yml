name: Repository / Publication Sequence

on:
  push:
    branches:
      - main
      - "release/**"

permissions:
  contents: read

concurrency:
  group: publication-sequence-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"

defaults:
  run:
    shell: bash

jobs:
  publication-sequence:
    name: Publication sequence
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out the exact publication subject
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up the pinned Python interpreter
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version

      - name: Validate the exact publication sequence
        run: |
          mkdir -p artifacts/ci
          python scripts/ci/validate_publication_sequence.py --ci-event "$GITHUB_EVENT_PATH" --repo . \
            2>&1 | tee artifacts/ci/publication-sequence.log

      - name: Prove publication validation did not mutate tracked evidence
        run: git diff --exit-code

      - name: Retain publication-sequence evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publication-sequence-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ci/publication-sequence.log
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
